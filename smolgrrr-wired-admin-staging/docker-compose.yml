version: "3.7"

services:
  app_proxy:
    container_name: smolgrrr-wired-admin-staging_app_proxy_1
    environment:
      APP_HOST: smolgrrr-wired-admin-staging_web_1
      APP_PORT: 3000
      PROXY_AUTH_ADD: "false"

  web:
    container_name: smolgrrr-wired-admin-staging_web_1
    image: ghcr.io/smolgrrr/wired-admin-web:staging-latest
    restart: on-failure
    stop_grace_period: 30s
    environment:
      PORT: "3000"
      NODE_ENV: production
      WIRED_DATA_DIR: "/app/data"
      FEED_SNAPSHOT_CACHE_FILE: "/app/data/feed-bootstrap.json"
      WIRED_MODERATION_STORE: "/app/data/moderation.json"
      CONFESS_STORE_FILE: "/app/data/confess.json"
      WIRED_ACCOUNT_STORE_FILE: "/app/data/wired-account.json"
      REVENUE_ENABLED: "true"
      REVENUE_DATABASE_FILE: "/app/data/revenue.sqlite"
      REVENUE_PUBLIC_BASE_URL: "https://staging.wiredsignal.online"
      REVENUE_RELAY_URL: "wss://staging.wiredsignal.online"
      REVENUE_LNURL_USERNAME: "wired"
      REVENUE_WALLET_BACKEND: "fake"
      REVENUE_ALLOW_FAKE_WALLET: "true"
      REVENUE_ENCRYPTION_KEY: ""
      REVENUE_RECONCILE_SECONDS: "30"
      REVENUE_LNBITS_ENDPOINT: ""
      REVENUE_LNBITS_INVOICE_KEY: ""
      REVENUE_LNBITS_ADMIN_KEY: ""
      REVENUE_ACCEPT_ENROLLMENTS: "true"
      REVENUE_ACCEPT_INVOICES: "true"
      REVENUE_SEND_PAYOUTS: "true"
      REVENUE_PUBLISH_PROFILE: "true"
      REVENUE_MAX_ROUTING_FEE_MSAT: "5000"
      WIRED_NOSTR_SECRET_KEY: ""
      WIRED_ACCOUNT_MIN_POW: "16"
      WIRED_ACCOUNT_RELAYS: ""
      WIRED_ACCOUNT_CONTENT_MAX_LENGTH: "2000"
      MODERATION_ADMIN_OPEN: "false"
      MODERATION_ADMIN_TOKEN: ""
      CRON_SECRET: ""
      PUBLIC_HOSTS: "staging.wiredsignal.online,*.wiredsignal.online,*.vercel.app,*.onion"
      FEED_SNAPSHOT_REFRESH_SECONDS: "300"
      FEED_SNAPSHOT_AGE_HOURS: "24"
      FEED_SNAPSHOT_TIMEOUT_MS: "20000"
      FEED_SNAPSHOT_REPLY_LIMIT: "500"
      POW_RELAYS: "wss://staging.wiredsignal.online,wss://powrelay.xyz,wss://pow.relays.land"
      ENRICHMENT_RELAYS: "wss://staging.wiredsignal.online,wss://relay.damus.io,wss://offchain.pub,wss://nos.lol,wss://relay.primal.net,wss://relay.nostr.band,wss://nostr.wine,wss://relay.snort.social"
      RELAY_BACKEND_URL: "ws://smolgrrr-wired-admin-staging_relay_1:7777"
      RELAY_NAME: "Wired Admin Staging"
      RELAY_DESCRIPTION: "Staging Wired proof-of-work Nostr relay, feed snapshot service, and moderation console backed by strfry."
      RELAY_CONTACT: ""
      RELAY_PUBKEY: ""
      RELAY_ICON: "https://raw.githubusercontent.com/smolgrrr/wired-admin/main/smolgrrr-wired-admin-staging/icon.png"
      RELAY_MIN_POW: "16"
      RELAY_SOFTWARE: "https://github.com/smolgrrr/wired-admin"
      RELAY_VERSION: "staging"
      CONFESS_NOSTR_SECRET_KEY: ""
      CONFESS_DAILY_LIMIT: "6"
      CONFESS_MIN_POW: "16"
      CONFESS_MAX_POW: "28"
      CONFESS_X_ENABLED: "false"
      CONFESS_X_DRY_RUN: "true"
      CONFESS_X_THREAD_BASE_URL: "https://staging.wiredsignal.online/thread"
    volumes:
      - ${APP_DATA_DIR}/data/web:/app/data
    depends_on:
      - relay

  relay:
    container_name: smolgrrr-wired-admin-staging_relay_1
    image: ghcr.io/hoytech/strfry@sha256:c52807349888ef8a9f8720f3e51ee81af7e20114bad105915febb78f9c604cb1
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 30s
    working_dir: /etc/strfry
    command: ["relay"]
    volumes:
      - ${APP_DATA_DIR}/data/strfry:/app/strfry-db
      - ${APP_DATA_DIR}/strfry.conf:/etc/strfry/strfry.conf:ro
