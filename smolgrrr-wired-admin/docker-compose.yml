version: "3.7"

services:
  app_proxy:
    container_name: smolgrrr-wired-admin_app_proxy_1
    environment:
      APP_HOST: smolgrrr-wired-admin_web_1
      APP_PORT: 3000
      PROXY_AUTH_ADD: "false"

  web:
    container_name: smolgrrr-wired-admin_web_1
    # This self-hosted app is intentionally published for the target deployment
    # architecture only; do not block Wired Admin updates on multi-arch image work.
    image: ghcr.io/smolgrrr/wired-admin-web:0.2.14
    restart: on-failure
    stop_grace_period: 30s
    environment:
      PORT: "3000"
      WIRED_DATA_DIR: "/app/data"
      FEED_SNAPSHOT_CACHE_FILE: "/app/data/feed-bootstrap.json"
      WIRED_MODERATION_STORE: "/app/data/moderation.json"
      CONFESS_STORE_FILE: "/app/data/confess.json"
      WIRED_ACCOUNT_STORE_FILE: "/app/data/wired-account.json"
      WIRED_NOSTR_SECRET_KEY: ""
      WIRED_ACCOUNT_MIN_POW: "16"
      WIRED_ACCOUNT_RELAYS: ""
      WIRED_ACCOUNT_CONTENT_MAX_LENGTH: "2000"
      CONFESS_NOSTR_SECRET_KEY: ""
      CONFESS_DAILY_LIMIT: "6"
      CONFESS_MIN_POW: "16"
      CONFESS_MAX_POW: "28"
      CONFESS_X_ENABLED: "false"
      CONFESS_X_DRY_RUN: "true"
      CONFESS_X_OAUTH1_API_KEY: ""
      CONFESS_X_OAUTH1_API_SECRET: ""
      CONFESS_X_OAUTH1_ACCESS_TOKEN: ""
      CONFESS_X_OAUTH1_ACCESS_SECRET: ""
      CONFESS_X_ACCOUNT_HANDLE: ""
      CONFESS_X_POST_PREFIX: ""
      CONFESS_X_POST_SUFFIX: ""
      CONFESS_X_IMAGE_POST_TEXT: ""
      CONFESS_X_IMAGE_WIDTH: "1200"
      CONFESS_X_IMAGE_HEIGHT: "675"
      CONFESS_X_IMAGE_TEMPLATE: "postcard-v1"
      CONFESS_X_IMAGE_MAX_BYTES: "4500000"
      CONFESS_X_THREAD_BASE_URL: "https://wiredsignal.online/thread"
      CONFESS_X_MAX_LENGTH: "260"
      CONFESS_X_SAFETY_MODE: "strict"
      CONFESS_X_RETRY_SECONDS: "300"
      CONFESS_X_MAX_ATTEMPTS: "6"
      CONFESS_X_POST_TIMEOUT_MS: "8000"
      MODERATION_ADMIN_OPEN: "true"
      PUBLIC_HOSTS: "wiredsignal.online,*.wiredsignal.online,*.vercel.app,*.onion"
      FEED_SNAPSHOT_REFRESH_SECONDS: "300"
      FEED_SNAPSHOT_AGE_HOURS: "24"
      FEED_SNAPSHOT_TIMEOUT_MS: "20000"
      FEED_SNAPSHOT_REPLY_LIMIT: "500"
      POW_RELAYS: "wss://relay.wiredsignal.online,wss://powrelay.xyz,wss://pow.relays.land"
      ENRICHMENT_RELAYS: "wss://relay.wiredsignal.online,wss://relay.damus.io,wss://offchain.pub,wss://nos.lol,wss://relay.primal.net,wss://relay.nostr.band,wss://nostr.wine,wss://relay.snort.social"
      RELAY_BACKEND_URL: "ws://smolgrrr-wired-admin_relay_1:7777"
      RELAY_NAME: "Wired Admin"
      RELAY_DESCRIPTION: "A Wired proof-of-work Nostr relay, feed snapshot service, and moderation console backed by strfry."
      RELAY_CONTACT: ""
      RELAY_PUBKEY: ""
      RELAY_ICON: "https://raw.githubusercontent.com/smolgrrr/wired-admin/main/smolgrrr-wired-admin/icon.png"
      RELAY_MIN_POW: "16"
      RELAY_SOFTWARE: "https://github.com/smolgrrr/wired-admin"
      RELAY_VERSION: "0.2.14"
    volumes:
      - ${APP_DATA_DIR}/data/web:/app/data
    depends_on:
      - relay

  relay:
    container_name: smolgrrr-wired-admin_relay_1
    image: ghcr.io/hoytech/strfry@sha256:c52807349888ef8a9f8720f3e51ee81af7e20114bad105915febb78f9c604cb1
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 30s
    working_dir: /etc/strfry
    command: ["relay"]
    volumes:
      - ${APP_DATA_DIR}/data/strfry:/app/strfry-db
      - ${APP_DATA_DIR}/strfry.conf:/etc/strfry/strfry.conf:ro
