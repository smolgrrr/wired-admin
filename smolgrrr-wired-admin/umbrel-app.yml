manifestVersion: 1
id: smolgrrr-wired-admin
category: social
name: Wired Admin
icon: https://raw.githubusercontent.com/smolgrrr/wired-admin/main/smolgrrr-wired-admin/icon.png
version: "0.2.8"
tagline: Admin console for Wired relay, feed, and moderation
description: >-
  Wired Admin runs a strfry Nostr relay behind a lightweight gateway that
  enforces NIP-13 proof-of-work before events reach the relay database. It also
  includes a local console for relay health, feed snapshot monitoring, and
  moderation actions used by Wired clients.

developer: smolgrrr
website: https://www.getwired.app/
dependencies: []
repo: https://github.com/smolgrrr/wired-admin
support: https://github.com/smolgrrr/wired-admin/issues
port: 3000
gallery: []
path: ""
defaultUsername: ""
defaultPassword: ""
deterministicPassword: false
torOnly: false
releaseNotes: >-
  Confess X mirror posts now publish the postcard image without caption text,
  render the postcard header from the Confess Nostr profile metadata, remove the
  in-image thread prompt, and use nevent thread links in the reply.
