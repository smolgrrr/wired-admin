services:
  web:
    image: ${WIRED_ADMIN_IMAGE:?set WIRED_ADMIN_IMAGE}
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      PORT: "3000"
      NODE_ENV: production
      WIRED_DATA_DIR: /app/data
      FEED_SNAPSHOT_CACHE_FILE: /app/data/feed-bootstrap.json
      WIRED_MODERATION_STORE: /app/data/moderation.json
      CONFESS_STORE_FILE: /app/data/confess.json
      WIRED_ACCOUNT_STORE_FILE: /app/data/wired-account.json
      REVENUE_ENABLED: ${REVENUE_ENABLED:-true}
      REVENUE_DATABASE_FILE: ${REVENUE_DATABASE_FILE:-/app/data/revenue-blink-canary.sqlite}
      REVENUE_PUBLIC_BASE_URL: ${REVENUE_PUBLIC_BASE_URL:-https://staging.wiredsignal.online}
      REVENUE_RELAY_URL: ${REVENUE_RELAY_URL:-wss://staging.wiredsignal.online}
      REVENUE_LNURL_USERNAME: ${REVENUE_LNURL_USERNAME:-wired}
      REVENUE_WALLET_BACKEND: ${REVENUE_WALLET_BACKEND:-fake}
      REVENUE_ALLOW_FAKE_WALLET: ${REVENUE_ALLOW_FAKE_WALLET:-true}
      REVENUE_ENCRYPTION_KEY: ${REVENUE_ENCRYPTION_KEY:?set REVENUE_ENCRYPTION_KEY}
      REVENUE_ENCRYPTION_KEY_VERSION: ${REVENUE_ENCRYPTION_KEY_VERSION:-1}
      REVENUE_ENCRYPTION_PREVIOUS_KEYS: ${REVENUE_ENCRYPTION_PREVIOUS_KEYS:-}
      REVENUE_RECONCILE_SECONDS: ${REVENUE_RECONCILE_SECONDS:-30}
      REVENUE_BLINK_ENDPOINT: ${REVENUE_BLINK_ENDPOINT:-https://api.blink.sv/graphql}
      REVENUE_BLINK_API_KEY: ${REVENUE_BLINK_API_KEY:-}
      REVENUE_BLINK_WALLET_ID: ${REVENUE_BLINK_WALLET_ID:-}
      REVENUE_BLINK_ACCOUNT_ID: ${REVENUE_BLINK_ACCOUNT_ID:-}
      REVENUE_LNBITS_ENDPOINT: ${REVENUE_LNBITS_ENDPOINT:-}
      REVENUE_LNBITS_INVOICE_KEY: ${REVENUE_LNBITS_INVOICE_KEY:-}
      REVENUE_LNBITS_ADMIN_KEY: ${REVENUE_LNBITS_ADMIN_KEY:-}
      REVENUE_ACCEPT_ENROLLMENTS: ${REVENUE_ACCEPT_ENROLLMENTS:-true}
      REVENUE_ACCEPT_INVOICES: ${REVENUE_ACCEPT_INVOICES:-true}
      REVENUE_SEND_PAYOUTS: ${REVENUE_SEND_PAYOUTS:-false}
      REVENUE_PUBLISH_PROFILE: ${REVENUE_PUBLISH_PROFILE:-true}
      REVENUE_MIN_SENDABLE_MSAT: ${REVENUE_MIN_SENDABLE_MSAT:-1000}
      REVENUE_MAX_SENDABLE_MSAT: ${REVENUE_MAX_SENDABLE_MSAT:-29000}
      REVENUE_MAX_ROUTING_FEE_MSAT: ${REVENUE_MAX_ROUTING_FEE_MSAT:-5000}
      REVENUE_PAYMENT_NOT_FOUND_GRACE_MS: ${REVENUE_PAYMENT_NOT_FOUND_GRACE_MS:-86400000}
      WIRED_NOSTR_SECRET_KEY: ${WIRED_NOSTR_SECRET_KEY:-}
      WIRED_ACCOUNT_MIN_POW: ${WIRED_ACCOUNT_MIN_POW:-16}
      WIRED_ACCOUNT_RELAYS: ${WIRED_ACCOUNT_RELAYS:-}
      WIRED_ACCOUNT_CONTENT_MAX_LENGTH: ${WIRED_ACCOUNT_CONTENT_MAX_LENGTH:-2000}
      MODERATION_ADMIN_OPEN: "false"
      MODERATION_ADMIN_TOKEN: ${MODERATION_ADMIN_TOKEN:?set MODERATION_ADMIN_TOKEN}
      CRON_SECRET: ${CRON_SECRET:?set CRON_SECRET}
      PUBLIC_HOSTS: ""
      FEED_SNAPSHOT_REFRESH_SECONDS: ${FEED_SNAPSHOT_REFRESH_SECONDS:-300}
      FEED_SNAPSHOT_AGE_HOURS: ${FEED_SNAPSHOT_AGE_HOURS:-24}
      FEED_SNAPSHOT_TIMEOUT_MS: ${FEED_SNAPSHOT_TIMEOUT_MS:-20000}
      FEED_SNAPSHOT_REPLY_LIMIT: ${FEED_SNAPSHOT_REPLY_LIMIT:-500}
      POW_RELAYS: ${POW_RELAYS:-wss://staging.wiredsignal.online,wss://powrelay.xyz,wss://pow.relays.land}
      ENRICHMENT_RELAYS: ${ENRICHMENT_RELAYS:-wss://staging.wiredsignal.online,wss://relay.damus.io,wss://offchain.pub,wss://nos.lol,wss://relay.primal.net,wss://relay.nostr.band,wss://nostr.wine,wss://relay.snort.social}
      RELAY_BACKEND_URL: ws://relay:7777
      RELAY_NAME: Wired Admin Staging
      RELAY_DESCRIPTION: Staging relay, feed snapshot service, and moderation console for Wired.
      RELAY_CONTACT: ""
      RELAY_PUBKEY: ""
      RELAY_ICON: https://raw.githubusercontent.com/smolgrrr/wired-admin/main/smolgrrr-wired-admin/icon.png
      RELAY_MIN_POW: ${RELAY_MIN_POW:-16}
      RELAY_SOFTWARE: https://github.com/smolgrrr/wired-admin
      RELAY_VERSION: staging
      CONFESS_NOSTR_SECRET_KEY: ""
      CONFESS_DAILY_LIMIT: "6"
      CONFESS_MIN_POW: ${RELAY_MIN_POW:-16}
      CONFESS_MAX_POW: "28"
      CONFESS_X_ENABLED: "false"
      CONFESS_X_DRY_RUN: "true"
      CONFESS_X_THREAD_BASE_URL: https://staging.wiredsignal.online/thread
    ports:
      - "${WIRED_ADMIN_STAGING_PORT:-3001}:3000"
    volumes:
      - ${WIRED_ADMIN_DATA_DIR:-./data}/web:/app/data
    depends_on:
      - relay

  relay:
    image: ghcr.io/hoytech/strfry@sha256:c52807349888ef8a9f8720f3e51ee81af7e20114bad105915febb78f9c604cb1
    user: "1000:1000"
    restart: unless-stopped
    stop_grace_period: 30s
    working_dir: /etc/strfry
    command: ["relay"]
    volumes:
      - ${WIRED_ADMIN_DATA_DIR:-./data}/strfry:/app/strfry-db
      - ${WIRED_ADMIN_STRFRY_CONF:-./strfry.conf}:/etc/strfry/strfry.conf:ro
