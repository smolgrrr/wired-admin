manifestVersion: 1
id: smolgrrr-wired-pow-relay
category: social
name: Wired PoW Relay
version: "0.1.0"
tagline: A proof-of-work Nostr relay for Wired
description: >-
  Wired PoW Relay runs a strfry Nostr relay behind a lightweight gateway that
  enforces NIP-13 proof-of-work before events reach the relay database. It also
  includes a local monitoring dashboard for relay health, client activity,
  publish acceptances, and PoW rejections.

