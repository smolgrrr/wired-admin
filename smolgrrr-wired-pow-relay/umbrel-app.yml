repo: https://github.com/smolgrrr/wired-pow-relay-app
support: https://github.com/smolgrrr/wired-pow-relay-app/issues
port: 3000
gallery: []
path: ""
defaultUsername: ""
defaultPassword: ""
deterministicPassword: false
torOnly: false
releaseNotes: >-
  Initial community app release with a strfry backend, NIP-13 PoW gateway, and
  monitoring dashboard.
