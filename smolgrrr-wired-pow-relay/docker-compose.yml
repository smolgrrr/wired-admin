version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: smolgrrr-wired-pow-relay_web_1
      APP_PORT: 3000
      PROXY_AUTH_ADD: "false"

  web:
    image: ghcr.io/smolgrrr/wired-pow-relay-app-web:0.1.0
    build: ./web
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 30s
    environment:
      PORT: "3000"
      RELAY_BACKEND_URL: "ws://relay:7777"
      RELAY_NAME: "Wired PoW Relay"
      RELAY_DESCRIPTION: "A Wired proof-of-work Nostr relay backed by strfry."
      RELAY_CONTACT: ""
      RELAY_PUBKEY: ""
      RELAY_ICON: "https://www.getwired.app/icon.png"
      RELAY_MIN_POW: "16"
      RELAY_SOFTWARE: "https://github.com/smolgrrr/wired-pow-relay-app"
      RELAY_VERSION: "0.1.0"
    depends_on:
      - relay

  relay:
    image: ghcr.io/hoytech/strfry:latest
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 30s
    working_dir: /etc/strfry
    command: ["strfry", "relay"]
    volumes:
      - ${APP_DATA_DIR}/data/strfry:/app/strfry-db
      - ./strfry.conf:/etc/strfry/strfry.conf:ro
