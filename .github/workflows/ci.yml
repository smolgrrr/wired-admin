name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - staging
      - "staging/**"
      - "preview/**"

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smolgrrr-wired-admin/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: smolgrrr-wired-admin/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check
