name: Staging preview

on:
  push:
    branches:
      - main
      - staging
      - "staging/**"
      - "preview/**"
  workflow_dispatch:
    inputs:
      image_tag:
        description: Existing image tag to deploy instead of building this ref
        required: false
        type: string
      deploy:
        description: Deploy to staging after the image is available
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}-web
  STAGING_BASE_URL: https://staging.wiredsignal.online

jobs:
  build:
    if: ${{ inputs.image_tag == '' || inputs.image_tag == null }}
    runs-on: ubuntu-latest
    outputs:
      image_tag: staging-${{ steps.short-sha.outputs.value }}
      image_ref: ${{ env.IMAGE_NAME }}:staging-${{ steps.short-sha.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Short SHA
        id: short-sha
        run: echo "value=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push staging image
        uses: docker/build-push-action@v6
        with:
          context: smolgrrr-wired-admin/web
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:staging-${{ steps.short-sha.outputs.value }}
            ${{ env.IMAGE_NAME }}:staging-latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  deploy:
    needs: build
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.deploy) }}
    runs-on:
      - self-hosted
      - Linux
      - X64
      - umbrel
      - wired-admin
    environment:
      name: staging
      url: https://staging.wiredsignal.online
    env:
      STAGING_APP_ID: smolgrrr-wired-admin-staging
      STAGING_APP_STORE_DIR: ${{ vars.STAGING_APP_STORE_DIR || '/home/umbrel/umbrel/app-stores/smolgrrr-wired-admin-github-957d0d1c' }}
      STAGING_PORT: ${{ vars.STAGING_PORT || '3002' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select image
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "IMAGE_REF=${IMAGE_NAME}:${{ inputs.image_tag }}" >> "$GITHUB_ENV"
            echo "DEPLOY_VERSION=${{ inputs.image_tag }}" >> "$GITHUB_ENV"
          else
            echo "IMAGE_REF=${{ needs.build.outputs.image_ref }}" >> "$GITHUB_ENV"
            echo "DEPLOY_VERSION=${{ needs.build.outputs.image_tag }}" >> "$GITHUB_ENV"
          fi

      - name: Prepare revenue profile verification
        run: |
          npm ci --prefix smolgrrr-wired-admin/web --omit=dev --ignore-scripts
          echo "REVENUE_PROFILE_NOT_BEFORE=$(($(date +%s) - 5))" >> "$GITHUB_ENV"

      - name: Deploy staging Umbrel app
        env:
          UMBREL_DIR: ${{ vars.STAGING_UMBREL_DIR || '/home/umbrel/umbrel' }}
          UMBREL_TRPC_ENDPOINT: ${{ vars.STAGING_UMBREL_TRPC_ENDPOINT || 'http://localhost/trpc' }}
          WIRED_ADMIN_APP_ID: ${{ env.STAGING_APP_ID }}
          WIRED_ADMIN_APP_STORE_REPOSITORY_URL: https://github.com/smolgrrr/wired-admin.git
          WIRED_ADMIN_APP_STORE_DIR: ${{ env.STAGING_APP_STORE_DIR }}
          WIRED_ADMIN_SOURCE_PACKAGE_DIR: smolgrrr-wired-admin-staging
          WIRED_ADMIN_SYNC_PACKAGE_TO_APP_STORE: "1"
          WIRED_ADMIN_MANIFEST_VERSION_OVERRIDE: staging
          WIRED_ADMIN_ALLOW_VERSION_MISMATCH: "1"
          WIRED_ADMIN_LOCAL_BASE_URL: http://127.0.0.1:${{ env.STAGING_PORT }}
          WIRED_ADMIN_PUBLIC_SMOKE_URLS: ${{ vars.STAGING_PUBLIC_SMOKE_URLS || '' }}
          WIRED_ADMIN_SET_MODERATION_ADMIN_OPEN: "false"
          WIRED_ADMIN_SET_MODERATION_ADMIN_TOKEN: ${{ secrets.STAGING_ADMIN_TOKEN }}
          WIRED_ADMIN_SET_CRON_SECRET: ${{ secrets.STAGING_ADMIN_TOKEN }}
          WIRED_ADMIN_SET_RELAY_MIN_POW: ${{ vars.STAGING_RELAY_MIN_POW || '16' }}
          WIRED_ADMIN_SET_CONFESS_MIN_POW: ${{ vars.STAGING_RELAY_MIN_POW || '16' }}
          WIRED_ADMIN_SET_WIRED_NOSTR_SECRET_KEY: ${{ secrets.STAGING_WIRED_NOSTR_SECRET_KEY }}
          WIRED_ADMIN_SET_WIRED_ACCOUNT_MIN_POW: ${{ vars.STAGING_WIRED_ACCOUNT_MIN_POW || vars.STAGING_RELAY_MIN_POW || '16' }}
          WIRED_ADMIN_SET_WIRED_ACCOUNT_RELAYS: ${{ vars.STAGING_WIRED_ACCOUNT_RELAYS || '' }}
          WIRED_ADMIN_SET_REVENUE_ENABLED: "true"
          WIRED_ADMIN_SET_REVENUE_DATABASE_FILE: ${{ vars.STAGING_REVENUE_DATABASE_FILE || '/app/data/revenue-blink-canary.sqlite' }}
          WIRED_ADMIN_SET_REVENUE_PUBLIC_BASE_URL: https://staging.wiredsignal.online
          WIRED_ADMIN_SET_REVENUE_RELAY_URL: wss://staging.wiredsignal.online
          WIRED_ADMIN_SET_REVENUE_LNURL_USERNAME: wired
          WIRED_ADMIN_SET_REVENUE_WALLET_BACKEND: ${{ vars.STAGING_REVENUE_WALLET_BACKEND || 'fake' }}
          WIRED_ADMIN_SET_REVENUE_ALLOW_FAKE_WALLET: "true"
          WIRED_ADMIN_SET_REVENUE_ENCRYPTION_KEY: ${{ secrets.STAGING_REVENUE_ENCRYPTION_KEY }}
          WIRED_ADMIN_SET_REVENUE_ENCRYPTION_KEY_VERSION: ${{ vars.STAGING_REVENUE_ENCRYPTION_KEY_VERSION || '1' }}
          WIRED_ADMIN_SET_REVENUE_ENCRYPTION_PREVIOUS_KEYS: ${{ secrets.STAGING_REVENUE_ENCRYPTION_PREVIOUS_KEYS }}
          WIRED_ADMIN_SET_REVENUE_MAX_ROUTING_FEE_MSAT: ${{ vars.STAGING_REVENUE_MAX_ROUTING_FEE_MSAT || '5000' }}
          WIRED_ADMIN_SET_REVENUE_PAYMENT_NOT_FOUND_GRACE_MS: ${{ vars.STAGING_REVENUE_PAYMENT_NOT_FOUND_GRACE_MS || '86400000' }}
          WIRED_ADMIN_SET_REVENUE_ACCEPT_ENROLLMENTS: ${{ vars.STAGING_REVENUE_ACCEPT_ENROLLMENTS || 'true' }}
          WIRED_ADMIN_SET_REVENUE_ACCEPT_INVOICES: ${{ vars.STAGING_REVENUE_ACCEPT_INVOICES || 'true' }}
          WIRED_ADMIN_SET_REVENUE_SEND_PAYOUTS: ${{ vars.STAGING_REVENUE_SEND_PAYOUTS || 'false' }}
          WIRED_ADMIN_SET_REVENUE_PUBLISH_PROFILE: "true"
          WIRED_ADMIN_SET_REVENUE_MINIMUM_PAYOUT_MSAT: ${{ vars.STAGING_REVENUE_MINIMUM_PAYOUT_MSAT || '14000' }}
          WIRED_ADMIN_SET_REVENUE_MIN_SENDABLE_MSAT: ${{ vars.STAGING_REVENUE_MIN_SENDABLE_MSAT || '1000' }}
          WIRED_ADMIN_SET_REVENUE_MAX_SENDABLE_MSAT: ${{ vars.STAGING_REVENUE_MAX_SENDABLE_MSAT || '21000' }}
          WIRED_ADMIN_SET_REVENUE_BLINK_ENDPOINT: ${{ vars.STAGING_REVENUE_BLINK_ENDPOINT || 'https://api.blink.sv/graphql' }}
          WIRED_ADMIN_SET_REVENUE_BLINK_API_KEY: ${{ secrets.STAGING_REVENUE_BLINK_API_KEY }}
          WIRED_ADMIN_SET_REVENUE_BLINK_WALLET_ID: ${{ vars.STAGING_REVENUE_BLINK_WALLET_ID || '' }}
          WIRED_ADMIN_SET_REVENUE_BLINK_ACCOUNT_ID: ${{ vars.STAGING_REVENUE_BLINK_ACCOUNT_ID || '' }}
          WIRED_ADMIN_SET_REVENUE_LNBITS_ENDPOINT: ${{ secrets.STAGING_REVENUE_LNBITS_ENDPOINT }}
          WIRED_ADMIN_SET_REVENUE_LNBITS_INVOICE_KEY: ${{ secrets.STAGING_REVENUE_LNBITS_INVOICE_KEY }}
          WIRED_ADMIN_SET_REVENUE_LNBITS_ADMIN_KEY: ${{ secrets.STAGING_REVENUE_LNBITS_ADMIN_KEY }}
          WIRED_ADMIN_SET_FEED_SNAPSHOT_AGE_HOURS: ${{ vars.STAGING_FEED_SNAPSHOT_AGE_HOURS || '24' }}
          WIRED_ADMIN_SET_FEED_SNAPSHOT_REFRESH_SECONDS: ${{ vars.STAGING_FEED_SNAPSHOT_REFRESH_SECONDS || '300' }}
        run: |
          export WIRED_ADMIN_IMAGE_OVERRIDE="${IMAGE_REF}"
          export WIRED_ADMIN_RELAY_VERSION_OVERRIDE="${DEPLOY_VERSION}"
          node scripts/deploy-wired-admin-umbrel.mjs

      - name: Smoke test staging
        env:
          STAGING_ADMIN_TOKEN: ${{ secrets.STAGING_ADMIN_TOKEN }}
          STAGING_SMOKE_BASE_URL: ${{ vars.STAGING_SMOKE_BASE_URL || '' }}
        run: |
          scripts/staging-smoke-test.sh "${STAGING_SMOKE_BASE_URL:-http://127.0.0.1:${STAGING_PORT}}"
          node scripts/verify-revenue-profile.mjs "${STAGING_BASE_URL}"
